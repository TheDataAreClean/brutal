  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Material Symbols Sharp';
      font-style: normal;
      font-weight: 100 700;
      font-display: block;
      src: url(../../assets/fonts/MaterialSymbolsSharp.woff2) format('woff2');
    }
    .material-symbols-sharp {
      font-family: 'Material Symbols Sharp';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      font-feature-settings: 'liga';
      -webkit-font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
    }
    :root {
      --black: #1a1a1a;
      --white: #ffffff;
      --on-accent: #ffffff;
      --gallery-overlay-bg: rgba(0,0,0,0.75);
      --gallery-btn-bg: rgba(0,0,0,0.3);
      --gallery-btn-bg-hover: rgba(0,0,0,0.6);
      --gallery-btn-border: rgba(255,255,255,0.5);
      --gallery-btn-border-hover: rgba(255,255,255,0.8);
      --gallery-btn-color: rgba(255,255,255,0.8);
      --lightbox-bg: rgba(0,0,0,0.95);
      --lightbox-frame-border: rgba(255,255,255,0.12);
      --lightbox-text: rgba(255,255,255,0.7);
      --lightbox-btn-border: rgba(255,255,255,0.3);
      --lightbox-btn-border-hover: rgba(255,255,255,0.6);
      --lightbox-btn-hover-bg: rgba(255,255,255,0.1);
      --inner-gap: 8px;
      --gallery-info-btn-sz: 28px;
      --gallery-info-btn-offset: 8px;
      --icon-sz: 16px;
      --icon-sz-lg: 18px;
      --nav-logo-season-sz: 14px;
      --accent: var(--accent-light);
      --accent-light: #7d4abf;
      --accent-dark: #a878d8;
      --space-xl: clamp(64px, 10vh, 120px);
      --space-lg: clamp(48px, 7vh, 80px);
      --space-md: clamp(24px, 3vw, 40px);
      --space-sm: 12px;
      --padding: clamp(24px, 5vw, 64px);
      --box-gap: var(--space-sm);
      --box-pad: 12px 16px;
      --bar-h: 40px;
      --bar-pad: 20px;
      --btn-pad-x: 16px;
      --text-display: clamp(32px, 9vw, 128px);
      --text-heading: clamp(24px, 4vw, 36px);
      --text-subhead: clamp(18px, 2.5vw, 24px);
      --text-body: clamp(15px, 1.3vw, 17px);
      --text-small: 13px;
      --text-ui: 11px;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    ::selection {
      background: var(--accent);
      color: var(--on-accent);
    }
    body {
      font-family: 'Schibsted Grotesk', sans-serif;
      font-weight: 400;
      background: var(--white);
      color: var(--black);
    }
    .highlight,
    .name {
      color: var(--accent);
    }
    [data-theme="dark"] {
      --black: #ffffff;
      --white: #000000;
      --accent: var(--accent-dark);
    }
    .skip-to-content {
      position: absolute;
      top: -100%;
      left: var(--padding);
      background: var(--accent);
      color: var(--on-accent);
      padding: var(--box-pad);
      font-size: var(--text-ui);
      font-weight: 700;
      letter-spacing: 1px;
      text-decoration: none;
      z-index: 100;
    }
    .skip-to-content:focus {
      top: 0;
    }
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--bar-pad) var(--padding) var(--box-gap);
      background: var(--white);
    }
    .top-bar-center {
      display: flex;
      align-items: center;
      gap: var(--box-gap);
    }
    .nav-logo-wrap {
      position: relative;
      width: var(--bar-h);
      height: var(--bar-h);
      background: var(--accent);
    }
    .nav-logo-home {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: var(--nav-logo-season-sz);
      cursor: pointer;
    }
    .nav-logo-season {
      position: absolute;
      bottom: 0;
      left: 0;
      width: var(--nav-logo-season-sz);
      height: var(--nav-logo-season-sz);
      background: var(--black);
      border: none;
      cursor: pointer;
      padding: 0;
    }
    @media (hover: hover) {
      .nav-logo-season:hover {
        background: var(--white);
      }
    }
    .bar-box {
      border: 1px solid var(--black);
      width: var(--bar-h);
      height: var(--bar-h);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      text-decoration: none;
      background: none;
      cursor: pointer;
      font-family: inherit;
    }
    @media (hover: hover) {
      .bar-box:hover {
        background: var(--accent);
        color: var(--on-accent);
        border-color: var(--accent);
      }
    }
    .bar-box .material-symbols-sharp {
      font-size: var(--icon-sz-lg);
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 18;
    }
    .bar-box svg {
      width: var(--icon-sz);
      height: var(--icon-sz);
      fill: currentColor;
    }
    .icon-sun { display: none; }
    .icon-moon { display: inline; }
    [data-theme="dark"] .icon-sun { display: inline; }
    [data-theme="dark"] .icon-moon { display: none; }
    .season-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 8px;
      background: var(--black);
      color: var(--white);
      font-size: var(--text-ui);
      letter-spacing: 1px;
      white-space: nowrap;
      z-index: 20;
    }
    .season-dropdown.open {
      display: block;
    }
    .season-option {
      display: flex;
      align-items: center;
      gap: var(--inner-gap);
      padding: 6px 10px;
      cursor: pointer;
      background: none;
      border: none;
      color: inherit;
      font: inherit;
      letter-spacing: inherit;
      width: 100%;
      text-align: left;
    }
    .season-option.active {
      background: var(--accent);
      color: var(--on-accent);
    }
    @media (hover: hover) {
      .season-option:hover {
        background: var(--accent);
        color: var(--on-accent);
      }
    }
    .season-swatch {
      width: 8px;
      height: 8px;
      flex-shrink: 0;
    }
    .season-info {
      padding: 8px 10px;
      opacity: 0.5;
      border-top: 1px solid currentColor;
      white-space: normal;
    }
    nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--box-gap) var(--padding) var(--bar-pad);
      background: var(--white);
    }
    .nav-link-box {
      border: 1px solid var(--black);
      height: var(--bar-h);
      display: inline-flex;
      align-items: center;
      padding: 0 var(--btn-pad-x);
      font-size: var(--text-ui);
      font-weight: 700;
      letter-spacing: 1px;
      text-decoration: none;
      color: var(--accent);
    }
    .nav-link-box.active {
      background: var(--accent);
      color: var(--on-accent);
      border-color: var(--accent);
      text-decoration: none;
    }
    @media (hover: hover) {
      .nav-link-box:hover {
        background: var(--accent);
        color: var(--on-accent);
        border-color: var(--accent);
        text-decoration: none;
      }
    }
    .content-box {
      position: fixed;
      top: calc(var(--bar-h) + var(--bar-pad) + 2 * var(--box-gap));
      bottom: calc(var(--bar-h) + var(--bar-pad) + 2 * var(--box-gap));
      left: var(--padding);
      right: var(--padding);
      border: 1px solid var(--black);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) transparent;
      padding: var(--box-gap) 0;
    }
    .content-box::-webkit-scrollbar {
      width: 4px;
      background: transparent;
    }
    .content-box::-webkit-scrollbar-thumb {
      background: var(--accent);
    }
    .toast {
      height: var(--bar-h);
      display: flex;
      align-items: center;
      background: var(--accent);
      color: var(--on-accent);
      font-size: var(--text-ui);
      font-weight: 700;
      letter-spacing: 1px;
      padding: 0 var(--btn-pad-x);
      opacity: 0;
      pointer-events: none;
    }
    .toast.visible {
      opacity: 1;
    }
    .hero {
      min-height: calc(100vh - 2 * var(--bar-h) - 2 * var(--bar-pad) - 4 * var(--box-gap) - 2px);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 var(--padding);
      padding-bottom: var(--space-xl);
    }
    .hero h1 {
      font-size: var(--text-display);
      line-height: 1;
    }
    .tagline {
      font-size: var(--text-subhead);
      color: var(--black);
      max-width: 700px;
      line-height: 1.5;
    }
    .hero .tagline {
      margin-top: var(--space-md);
    }
    .page-intro {
      min-height: calc(100vh - 2 * var(--bar-h) - 2 * var(--bar-pad) - 4 * var(--box-gap) - 2px);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 var(--padding);
      padding-bottom: var(--space-xl);
    }
    .page-intro .tagline {
      font-size: var(--text-heading);
      max-width: none;
    }
    .project-header {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      align-items: flex-start;
    }
    section {
      padding: var(--space-lg) var(--padding);
    }
    .section-title {
      font-size: var(--text-heading);
      font-weight: 500;
      line-height: 1.05;
      margin-bottom: var(--space-md);
    }
    .section-subtitle {
      font-size: var(--text-body);
      line-height: 1.5;
      margin-top: calc(-1 * var(--space-md) + 16px);
      margin-bottom: var(--space-md);
    }
    .about-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
      align-items: start;
    }
    .about-content h2 {
      font-size: var(--text-heading);
      font-weight: 500;
      line-height: 1.5;
    }
    .about-content h2 .thin {
      display: block;
    }
    .about-text {
      font-size: var(--text-body);
      line-height: 1.5;
      border: 1px solid var(--black);
      padding: var(--box-pad);
    }
    .about-text p + p {
      margin-top: var(--space-md);
    }
    .offerings {
      display: flex;
      flex-wrap: wrap;
      gap: var(--box-gap);
    }
    .offering-tag,
    .interest-tag {
      border: 1px solid var(--black);
      padding: var(--box-pad);
      font-size: var(--text-small);
      line-height: 1.5;
    }
    .projects {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--box-gap);
    }
    .project {
      border: 1px solid var(--black);
      padding: var(--box-pad);
      display: flex;
      flex-direction: column;
      gap: var(--inner-gap);
      min-width: 0;
    }
    .project-name {
      font-size: var(--text-body);
      font-weight: 700;
      line-height: 1.5;
    }
    .project-role {
      font-size: var(--text-small);
      line-height: 1.4;
      letter-spacing: 0.5px;
      color: var(--accent);
    }
    .project-desc {
      font-size: var(--text-small);
      line-height: 1.4;
      overflow-wrap: break-word;
      word-break: break-word;
      flex: 1;
    }
    .project-desc a {
      color: var(--accent);
      text-decoration: none;
    }
    .project-actions {
      display: flex;
      gap: var(--box-gap);
      margin-top: 4px;
    }
    .project-visit.bar-box {
      width: var(--bar-h);
      height: var(--bar-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .project-casestudy.bar-box {
      flex: 1;
      height: var(--bar-h);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-ui);
      font-weight: 700;
      letter-spacing: 1px;
      text-decoration: none;
    }
    .project-detail-text p {
      font-size: var(--text-body);
      line-height: 1.5;
      margin-bottom: var(--space-sm);
    }
    .project-detail-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--inner-gap);
    }
    .project-detail-list li {
      font-size: var(--text-body);
      line-height: 1.5;
      padding-left: 1em;
      position: relative;
    }
    .project-detail-list li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--accent);
    }
    .project-highlights {
      display: flex;
      flex-direction: column;
      gap: var(--inner-gap);
    }
    .project-highlight a {
      font-size: var(--text-body);
      color: var(--accent);
      text-decoration: none;
    }
    .project-back.bar-box {
      display: inline-flex;
      align-items: center;
      width: auto;
      height: var(--bar-h);
      padding: 0 var(--btn-pad-x);
      font-size: var(--text-ui);
      font-weight: 700;
      letter-spacing: 1px;
      text-decoration: none;
    }
    .project-highlights + .project-back.bar-box {
      margin-top: var(--space-md);
    }
    .articles {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--box-gap);
    }
    .article {
      border: 1px solid var(--black);
      padding: var(--box-pad);
      display: grid;
      grid-template-rows: 1fr auto auto;
      gap: var(--inner-gap);
      text-decoration: none;
      color: inherit;
      position: relative;
    }
    @media (hover: hover) {
      .article:hover {
        color: var(--accent);
      }
    }
    .article-name {
      font-size: var(--text-body);
      font-weight: 700;
      line-height: 1.5;
      padding-right: var(--gallery-info-btn-sz);
    }
    .article-meta {
      display: flex;
      align-items: center;
      gap: var(--inner-gap);
    }
    .article-publisher {
      font-size: var(--text-small);
      letter-spacing: 0.5px;
      color: var(--accent);
      line-height: 1.4;
    }
    .article-date {
      font-size: var(--text-small);
      letter-spacing: 0.5px;
      line-height: 1.4;
    }
    .article-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .article-tag {
      font-size: var(--text-ui);
      letter-spacing: 1px;
      border: 1px solid var(--black);
      padding: 2px 8px;
      line-height: 1.4;
    }
    .article-arrow {
      color: var(--accent);
      position: absolute;
      top: var(--box-gap);
      right: var(--btn-pad-x);
      flex-shrink: 0;
    }
    .article-arrow .material-symbols-sharp {
      font-size: var(--icon-sz-lg);
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 18;
    }
    .lately-list {
      display: flex;
      flex-direction: column;
      gap: var(--box-gap);
      align-items: flex-start;
    }
    .lately-item {
      border: 1px solid var(--black);
      padding: var(--box-pad);
      display: flex;
      align-items: center;
      gap: var(--inner-gap);
      text-decoration: none;
      color: inherit;
    }
    .lately-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: var(--text-small);
      line-height: 1.4;
      letter-spacing: 0.5px;
      color: var(--accent);
    }
    .lately-label .material-symbols-sharp {
      font-size: var(--icon-sz);
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 16;
    }
    .lately-value {
      font-size: var(--text-small);
      font-weight: 700;
      line-height: 1.4;
    }
    .lately-arrow {
      color: var(--accent);
      display: flex;
      align-items: center;
    }
    .lately-arrow .material-symbols-sharp {
      font-size: var(--icon-sz);
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 16;
    }
    @media (hover: hover) {
      .lately-item:hover {
        color: var(--accent);
      }
    }
    .interests {
      display: flex;
      flex-wrap: wrap;
      gap: var(--box-gap);
    }
    .rolodex-header {
      display: flex;
      align-items: center;
      gap: var(--box-gap);
    }
    .rolodex-header .section-title {
      margin-bottom: 0;
    }
    .rolodex-header .bar-box {
      flex-shrink: 0;
    }
    .rolodex {
      margin-top: var(--space-md);
      display: flex;
      flex-wrap: wrap;
      gap: var(--box-gap);
    }
    .rolodex-item {
      border: 1px solid var(--black);
      padding: var(--box-pad);
      display: flex;
      align-items: center;
      gap: var(--inner-gap);
      text-decoration: none;
      color: inherit;
    }
    @media (hover: hover) {
      .rolodex-item:hover {
        color: var(--accent);
      }
    }
    .rolodex-name {
      font-size: var(--text-small);
      font-weight: 700;
      line-height: 1.4;
    }
    .rolodex-arrow {
      color: var(--accent);
    }
    .rolodex-arrow .material-symbols-sharp {
      font-size: var(--icon-sz);
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 16;
    }
    .gallery {
      display: flex;
      gap: var(--box-gap);
    }
    .gallery-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: var(--box-gap);
    }
    .gallery-item {
      border: 1px solid var(--black);
      cursor: pointer;
    }
    .gallery-img-wrap {
      position: relative;
    }
    .gallery-item img {
      width: 100%;
      display: block;
    }
    .gallery-info-btn {
      position: absolute;
      bottom: var(--gallery-info-btn-offset);
      right: var(--gallery-info-btn-offset);
      width: var(--gallery-info-btn-sz);
      height: var(--gallery-info-btn-sz);
      border: 1px solid var(--gallery-btn-border);
      background: var(--gallery-btn-bg);
      color: var(--gallery-btn-color);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      z-index: 2;
    }
    .gallery-info-btn .material-symbols-sharp {
      font-size: var(--icon-sz);
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 16;
    }
    @media (hover: hover) {
      .gallery-info-btn:hover {
        background: var(--gallery-btn-bg-hover);
        border-color: var(--gallery-btn-border-hover);
        color: var(--on-accent);
      }
    }
    .gallery-icon-info  { display: inline; }
    .gallery-icon-close { display: none; }
    .info-open .gallery-icon-info  { display: none; }
    .info-open .gallery-icon-close { display: inline; }
    .gallery-info-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--gallery-overlay-bg);
      color: var(--on-accent);
      display: none;
      flex-direction: column;
      justify-content: flex-end;
      padding: var(--box-gap) calc(var(--gallery-info-btn-sz) + 2 * var(--gallery-info-btn-offset)) var(--box-gap) var(--btn-pad-x);
      gap: 2px;
      font-size: var(--text-ui);
      letter-spacing: 1px;
      line-height: 1.4;
      z-index: 1;
    }
    .info-open .gallery-info-overlay {
      display: flex;
    }
    .gallery-info-title {
      font-size: var(--text-small);
      font-weight: 700;
      letter-spacing: 0;
      margin-bottom: 4px;
    }
    .gallery-info-camera {
      font-weight: 700;
    }
    .gallery-hidden,
    .article-hidden {
      display: none;
    }
    .articles-show-more.bar-box,
    .gallery-show-more.bar-box,
    .gallery-view-all.bar-box {
      width: 100%;
      height: var(--bar-h);
      padding: 0 var(--btn-pad-x);
      margin-top: var(--space-md);
      font-size: var(--text-ui);
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--inner-gap);
    }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: var(--lightbox-bg);
      display: none;
      flex-direction: column;
      padding: 0 var(--padding);
    }
    .lightbox.open {
      display: flex;
    }
    .lightbox-header {
      height: calc(var(--bar-h) + var(--bar-pad) + 2 * var(--box-gap));
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .lightbox-body {
      flex: 1;
      min-height: 0;
      display: flex;
      gap: var(--space-md);
      padding-bottom: calc(var(--bar-h) + var(--bar-pad) + 2 * var(--box-gap));
    }
    .lightbox-frame {
      flex: 1;
      min-width: 0;
      position: relative;
      border: 1px solid var(--lightbox-frame-border);
    }
    .lightbox-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .lightbox-sidebar {
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: var(--box-gap);
    }
    .lightbox-meta {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: var(--lightbox-text);
      font-size: var(--text-small);
      line-height: 1.4;
    }
    .lightbox-meta span {
      min-height: 1.4em;
    }
    .lightbox-title {
      font-weight: 700;
      color: var(--on-accent);
      letter-spacing: 0;
    }
    .lightbox-camera {
      font-weight: 700;
    }
    .lightbox-nav {
      display: flex;
      align-items: center;
      width: 100%;
    }
    .lightbox-counter {
      flex: 1;
      text-align: center;
      font-size: var(--text-ui);
      letter-spacing: 1px;
      color: var(--lightbox-text);
      white-space: nowrap;
    }
    .lightbox-btn {
      width: var(--bar-h);
      height: var(--bar-h);
      flex-shrink: 0;
      border: 1px solid var(--lightbox-btn-border);
      background: none;
      color: var(--lightbox-text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: inherit;
      font-size: var(--text-ui);
      letter-spacing: 1px;
      font-weight: 700;
    }
    .lightbox-btn .material-symbols-sharp {
      font-size: var(--icon-sz-lg);
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 18;
    }
    @media (hover: hover) {
      .lightbox-btn:hover {
        background: var(--lightbox-btn-hover-bg);
        border-color: var(--lightbox-btn-border-hover);
        color: var(--on-accent);
      }
    }
    footer {
      padding: var(--space-lg) var(--padding);
    }
    .footer-meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--box-gap);
      font-size: var(--text-small);
    }
    .footer-meta > span,
    .footer-bottom > span {
      border: 1px solid var(--black);
      padding: var(--box-pad);
      line-height: 1.4;
      letter-spacing: 0.5px;
    }
    .footer-meta a,
    .footer-bottom a {
      color: var(--accent);
      text-decoration: none;
    }
    @media (hover: hover) {
      .footer-meta a:hover,
      .footer-bottom a:hover {
        text-decoration: underline;
      }
    }
    .footer-bottom {
      display: flex;
      flex-wrap: wrap;
      gap: var(--box-gap);
      margin-top: var(--space-lg);
      font-size: var(--text-small);
    }
    @media (max-width: 768px) {
      .projects,
      .articles {
        grid-template-columns: 1fr;
      }
      .article {
        grid-template-rows: auto auto auto;
      }
      .about-content {
        grid-template-columns: 1fr;
        gap: var(--space-md);
      }
      .lately-list {
        align-items: stretch;
      }
      .lately-item {
        flex-wrap: wrap;
        position: relative;
      }
      .lately-value {
        flex: 1 1 100%;
      }
      .lately-arrow {
        position: absolute;
        top: 12px;
        right: 16px;
      }
      .footer-meta,
      .footer-bottom {
        align-items: flex-start;
      }
      .lightbox {
        padding: 0;
      }
      .lightbox-header {
        padding: 0 var(--padding);
      }
      .lightbox-body {
        flex-direction: column;
        gap: 0;
        padding-bottom: 0;
      }
      .lightbox-frame {
        flex: 1;
        width: 100%;
        border: none;
        min-height: 0;
      }
      .lightbox-sidebar {
        width: 100%;
        flex-direction: column;
        flex-shrink: 0;
        padding: var(--box-gap) var(--padding) var(--bar-pad);
        gap: var(--box-gap);
      }
      .lightbox-meta {
        flex: none;
      }
    }
  </style>
</head>

  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var current = html.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      sessionStorage.setItem('theme', next);
    }
    function copyEmail(btn) {
      navigator.clipboard.writeText(btn.dataset.email).then(function() {
        var toast = document.getElementById('toast');
        toast.classList.add('visible');
        setTimeout(function() { toast.classList.remove('visible'); }, 2000);
      }).catch(function() {});
    }
    // Restore theme from session, else match OS
    (function() {
      var saved = sessionStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
    // Seasonal accent — Bengaluru blooms
    var seasons = [
      { name: 'Flame of Forest', light: '#c84520', dark: '#e87040' },
      { name: 'Jacaranda',       light: '#7d4abf', dark: '#a878d8' },
      { name: 'Pongamia',        light: '#9870b0', dark: '#b898d0' },
      { name: 'Golden Shower',   light: '#b89010', dark: '#d8b030' },
      { name: 'Gulmohar',        light: '#c83020', dark: '#e86040' },
      { name: 'Copper Pod',      light: '#a89018', dark: '#c8b030' },
      { name: 'Oleander',        light: '#c84568', dark: '#e87898' },
      { name: 'Bougainvillea',   light: '#c82852', dark: '#f0456a' },
      { name: 'Purple Bauhinia', light: '#8040a8', dark: '#a868c8' },
      { name: 'Tabebuia Rosea',  light: '#c85080', dark: '#e880a8' },
      { name: 'Rain Tree',       light: '#b87878', dark: '#d0a0a0' },
      { name: 'Poinsettia',      light: '#c02838', dark: '#e85060' }
    ];
    var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var activeSeason = new Date().getMonth();
    function applySeason(index, save) {
      activeSeason = index;
      document.documentElement.style.setProperty('--accent-light', seasons[index].light);
      document.documentElement.style.setProperty('--accent-dark', seasons[index].dark);
      var btns = document.querySelectorAll('.season-option');
      btns.forEach(function(btn, i) {
        btn.classList.toggle('active', i === index);
      });
      if (save) sessionStorage.setItem('season', index);
    }
    // Restore season from session, else default to current month
    var savedSeason = parseInt(sessionStorage.getItem('season'), 10);
    applySeason(!isNaN(savedSeason) ? savedSeason : new Date().getMonth());
    // Build dropdown (safe DOM — no innerHTML)
    (function() {
      var dropdown = document.getElementById('season-dropdown');
      seasons.forEach(function(s, i) {
        var btn = document.createElement('button');
        btn.className = 'season-option' + (i === activeSeason ? ' active' : '');
        var swatch = document.createElement('span');
        swatch.className = 'season-swatch';
        swatch.style.background = s.light;
        btn.appendChild(swatch);
        btn.appendChild(document.createTextNode(monthNames[i] + ' — ' + s.name));
        btn.onclick = function(e) {
          e.stopPropagation();
          applySeason(i, true);
          dropdown.classList.remove('open');
        };
        dropdown.appendChild(btn);
      });
      var info = document.createElement('div');
      info.className = 'season-info';
      info.textContent = dropdown.dataset.info || '';
      dropdown.appendChild(info);
    })();
    function toggleSeasons(e) {
      e.stopPropagation();
      document.getElementById('season-dropdown').classList.toggle('open');
    }
    document.addEventListener('click', function() {
      document.getElementById('season-dropdown').classList.remove('open');
    });
    // Local time (pauses when tab is hidden)
    (function() {
      var timer;
      function updateTime() {
        var now = new Date().toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', hour12: true });
        document.getElementById('local-time').textContent = now + ' IST';
      }
      function start() { updateTime(); timer = setInterval(updateTime, 60000); }
      function stop() { clearInterval(timer); }
      start();
      document.addEventListener('visibilitychange', function() {
        if (document.hidden) { stop(); } else { start(); }
      });
    })();
    // Cached fetch helper (localStorage, 1h TTL)
    function cachedFetch(key, url, parse, onSuccess, onError) {
      var cached = localStorage.getItem(key);
      var ts = localStorage.getItem(key + '_ts');
      if (cached && ts && Date.now() - Number(ts) < 3600000) {
        onSuccess(cached);
        return;
      }
      fetch(url)
        .then(parse)
        .then(function(value) {
          localStorage.setItem(key, value);
          localStorage.setItem(key + '_ts', String(Date.now()));
          onSuccess(value);
        })
        .catch(function() { onError(); });
    }
    // Temperature from Open-Meteo (cached 1h)
    cachedFetch(
      'weather_temp',
      'https://api.open-meteo.com/v1/forecast?latitude=12.97&longitude=77.59&current=temperature_2m',
      function(r) { return r.json().then(function(d) { return Math.round(d.current.temperature_2m) + '°C'; }); },
      function(v) { document.getElementById('temperature').textContent = v; },
      function() { document.getElementById('temperature').textContent = '--'; }
    );
    // AQI from Open-Meteo (cached 1h)
    cachedFetch(
      'weather_aqi',
      'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=12.97&longitude=77.59&current=us_aqi',
      function(r) {
        return r.json().then(function(d) {
          var aqi = d.current.us_aqi;
          var label = aqi <= 50 ? 'Good' : aqi <= 100 ? 'Moderate' : aqi <= 150 ? 'Unhealthy for some' : aqi <= 200 ? 'Unhealthy' : 'Poor';
          return aqi + ' — ' + label;
        });
      },
      function(v) { document.getElementById('aqi').textContent = v; },
      function() { document.getElementById('aqi').textContent = '--'; }
    );
  </script>
